<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UNIVERSO RAG</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #14213d;
        --muted: #5f6b7a;
        --line: #d9e1ea;
        --blue: #0b5cad;
        --green: #197278;
        --bg: #f7f9fc;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .bar {
        max-width: 1120px;
        margin: 0 auto;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .mark {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--blue);
        color: white;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
      }

      main {
        max-width: 1120px;
        width: 100%;
        margin: 0 auto;
        padding: 20px;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 18px;
      }

      .chat,
      .side {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .messages {
        height: calc(100vh - 238px);
        min-height: 360px;
        overflow: auto;
        padding: 18px;
      }

      .msg {
        max-width: 820px;
        margin-bottom: 14px;
        padding: 12px 14px;
        border-radius: 8px;
        white-space: pre-wrap;
        line-height: 1.45;
      }

      .msg.user {
        margin-left: auto;
        background: #e9f2ff;
      }

      .msg.bot {
        background: #f1f5f4;
      }

      .composer {
        border-top: 1px solid var(--line);
        padding: 14px;
        display: grid;
        grid-template-columns: 150px 1fr auto;
        gap: 10px;
      }

      select,
      input,
      button {
        height: 42px;
        border-radius: 8px;
        border: 1px solid var(--line);
        font: inherit;
      }

      input {
        min-width: 0;
        padding: 0 12px;
      }

      select {
        padding: 0 10px;
        background: white;
      }

      button {
        padding: 0 16px;
        border-color: var(--blue);
        background: var(--blue);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .side {
        padding: 16px;
        overflow: auto;
        max-height: calc(100vh - 120px);
      }

      .side h2 {
        margin: 0 0 12px;
        font-size: 15px;
      }

      .source {
        border-top: 1px solid var(--line);
        padding: 12px 0;
      }

      .source:first-of-type {
        border-top: 0;
      }

      .source a {
        color: var(--blue);
        font-weight: 700;
        text-decoration: none;
      }

      .source p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      footer {
        padding: 10px 20px 16px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      @media (max-width: 860px) {
        main {
          grid-template-columns: 1fr;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .messages {
          height: 52vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="bar">
          <div class="brand">
            <div class="mark">U</div>
            <div>
              <h1>UNIVERSO RAG</h1>
              <div class="status" id="status">verificando servicos...</div>
            </div>
          </div>
        </div>
      </header>

      <main>
        <section class="chat">
          <div class="messages" id="messages"></div>
          <form class="composer" id="form">
            <select id="mode" aria-label="Modo">
              <option value="ollama">Ollama</option>
              <option value="cloud">Cloud</option>
              <option value="compare">Comparar</option>
            </select>
            <input id="question" name="question" autocomplete="off" placeholder="Digite sua pergunta" />
            <button id="send" type="submit">Enviar</button>
          </form>
        </section>

        <aside class="side">
          <h2>Fontes recuperadas</h2>
          <div id="sources"></div>
        </aside>
      </main>

      <footer>Respostas baseadas nas fontes publicas oficiais indexadas.</footer>
    </div>

    <script>
      const messages = document.querySelector("#messages");
      const sources = document.querySelector("#sources");
      const statusEl = document.querySelector("#status");
      const form = document.querySelector("#form");
      const questionEl = document.querySelector("#question");
      const modeEl = document.querySelector("#mode");
      const sendEl = document.querySelector("#send");

      function addMessage(kind, text) {
        const node = document.createElement("div");
        node.className = `msg ${kind}`;
        node.textContent = text;
        messages.appendChild(node);
        messages.scrollTop = messages.scrollHeight;
      }

      function renderSources(items) {
        sources.innerHTML = "";
        if (!items.length) {
          sources.textContent = "Sem fontes para esta resposta.";
          return;
        }
        for (const item of items) {
          const node = document.createElement("div");
          node.className = "source";
          node.innerHTML = `
            <a href="${item.url}" target="_blank" rel="noreferrer">${item.title}</a>
            <p>${item.category} · score ${Number(item.score).toFixed(3)}</p>
            <p>${item.excerpt}</p>
          `;
          sources.appendChild(node);
        }
      }

      function renderAnswer(data) {
        if (data.mode === "compare" && data.providers.length) {
          return data.providers.map((provider) => {
            const title = provider.provider === "ollama" ? "Ollama" : "Cloud";
            return `${title}\n${provider.answer}`;
          }).join("\n\n");
        }
        return data.answer;
      }

      async function refreshHealth() {
        try {
          const response = await fetch("/health");
          const data = await response.json();
          statusEl.textContent = `app ${data.app} · qdrant ${data.qdrant} · ollama ${data.ollama}`;
        } catch {
          statusEl.textContent = "servicos indisponiveis";
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const question = questionEl.value.trim();
        if (!question) return;

        addMessage("user", question);
        questionEl.value = "";
        sendEl.disabled = true;
        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, mode: modeEl.value })
          });
          const data = await response.json();
          addMessage("bot", renderAnswer(data));
          renderSources(data.citations || []);
        } catch (error) {
          addMessage("bot", "Nao foi possivel processar a pergunta.");
          renderSources([]);
        } finally {
          sendEl.disabled = false;
          questionEl.focus();
        }
      });

      addMessage("bot", "Pronto para consultar as fontes indexadas da UNIVERSO.");
      renderSources([]);
      refreshHealth();
    </script>
  </body>
</html>
