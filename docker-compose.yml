services:
  app:
    build: .
    container_name: universo-rag-app
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      LLM_MODE: ${LLM_MODE:-ollama}
      CLOUD_API_BASE_URL: ${CLOUD_API_BASE_URL:-https://api.openai.com/v1}
      CLOUD_API_KEY: ${CLOUD_API_KEY:-}
      CLOUD_MODEL: ${CLOUD_MODEL:-}
      MIN_RETRIEVAL_SCORE: ${MIN_RETRIEVAL_SCORE:-0.35}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-universo_rag_sources}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./universo_links_tcc_2.md:/app/universo_links_tcc_2.md:ro
      - ./universo_links_tcc.md:/app/universo_links_tcc.md:ro
    depends_on:
      - qdrant
      - ollama

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: universo-rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: universo-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

volumes:
  qdrant_storage:
  ollama_storage:

